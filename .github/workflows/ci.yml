name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── 1. Tests y cobertura ──────────────────────────────────────────────────
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod   # Lee la versión directamente del go.mod
          cache: true               # Cachea módulos automáticamente

      - name: Descargar dependencias
        run: go mod download

      - name: Verificar go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || (echo "go.mod/go.sum no están actualizados, ejecuta 'go mod tidy'" && exit 1)

      - name: Ejecutar tests con cobertura
        run: |
          # Excluye el paquete db (código generado por sqlc) y cmd/server del cómputo
          PKGS=$(go list ./... | grep -v 'internal/db' | grep -v 'cmd/server' | tr '\n' ',')
          go test ./... -coverprofile=coverage.out -covermode=atomic -coverpkg=${PKGS%,} -v

      - name: Verificar cobertura mínima (≥60%)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print substr($3, 1, length($3)-1)}')
          echo "Cobertura total: $COVERAGE%"
          if [ "$(echo "$COVERAGE >= 60" | bc -l)" -ne 1 ]; then
            echo "❌ Cobertura insuficiente: $COVERAGE% (mínimo requerido: 60%)"
            exit 1
          fi
          echo "✅ Cobertura OK: $COVERAGE%"

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

  # ─── 2. Build del binario ──────────────────────────────────────────────────
  build:
    name: Build Binario
    runs-on: ubuntu-latest
    needs: test   # Solo corre si los tests pasan

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Compilar binario
        run: CGO_ENABLED=0 GOOS=linux go build -o server ./cmd/server

      - name: Verificar binario generado
        run: ls -lh ./server

  # ─── 3. Build de imagen Docker ─────────────────────────────────────────────
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test   # Solo corre si los tests pasan

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir imagen Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false   # Solo construye, no sube (hasta tener registry)
          tags: sistema-reservas:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── 4. Deploy a Dokploy (VPS) ────────────────────────────────────────────
  deploy:
    name: Deploy a Dokploy
    runs-on: ubuntu-latest
    needs: [test, docker]
    # Solo se despliega al hacer push a main (no en PRs)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger deploy en Dokploy
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.DOKPLOY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json")
          echo "Respuesta de Dokploy: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "❌ El webhook de Dokploy respondió con error: $HTTP_STATUS"
            exit 1
          fi
          echo "✅ Deploy disparado correctamente en Dokploy"

